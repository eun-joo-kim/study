name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: |
          rm -rf deploy
          mkdir -p deploy/memo
          cp -R dist/* deploy/memo/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./deploy
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
